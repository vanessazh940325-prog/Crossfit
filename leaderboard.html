<!DOCTYPE html>
<html lang="es">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Arial&family=Barlow:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

    <header class="topbar">
        <div class="wrap">
            <div class="brand">SNACI <span style="color:var(--brass)">GAMES</span> <small>CROSSFIT COMP.</small></div>
            <nav class="nav" id="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="leaderboard.html" class="is-active">Leaderboard</a>

            </nav>
            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>
    <div class="hazard"></div>
    <script>document.addEventListener("DOMContentLoaded", function () {
      var menuBtn = document.getElementById("menu-toggle");
      var navMenu = document.getElementById("nav-menu");
      if (!menuBtn || !navMenu) return;
      menuBtn.addEventListener("click", function () {
        var isOpen = navMenu.classList.toggle("is-open");
        menuBtn.setAttribute("aria-expanded", isOpen);
      });
    });</script>

    <section class="lb-header">
        <div class="wrap">

    <section class="lb-wrap">
        <div class="wrap">
            <div class="table-scroll">
                <table class="board board-compact" aria-describedby="lb-note">
                    <caption>Leaderboard de la categoría</caption>
                    <thead id="board-head"></thead>
                    <tbody id="board-body"></tbody>
                </table>
            </div>
            <p class="lb-note" id="lb-note">El Puesto general lo define quién suma más puntos entre los WODs.</p>
        </div>

    <footer>
        <div class="wrap">
